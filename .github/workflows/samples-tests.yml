name: Sample Tests

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  workflow_dispatch:

jobs:
  test:
    name: Token Samples Tests
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - platform: "fabricx"
          - platform: "fabric3"
      fail-fast: false
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: tokens/go.mod
          cache-dependency-path: tokens/go.sum

      - name: Verify Go installation
        run: |
          go version
          echo "GOPATH: $GOPATH"
          echo "GOROOT: $GOROOT"

      - name: Set up Python
        if: ${{ matrix.platform == 'fabricx' }}
        uses: actions/setup-python@v4
        with:
          python-version: "3.x"

      - name: Install Ansible
        if: ${{ matrix.platform == 'fabricx' }}
        run: |
          python -m pip install --upgrade pip
          pip install ansible ansible-core
          ansible --version

      - name: Run samples tests on ${{ matrix.platform }}
        env:
          PLATFORM: ${{ matrix.platform }}
        working-directory: tokens
        run: make install-prerequisites test
