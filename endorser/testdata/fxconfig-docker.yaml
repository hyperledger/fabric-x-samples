logging:
  level: info

msp:
  localMspID: Org1MSP
  configPath: /testdata/crypto/peerOrganizations/Org1/users/channel_admin@org1.example.com/msp

orderer:
  address: committer:7050
  channel: mychannel
  tls:
    enabled: true
    # The test node bundles orderer and committer behind a shared TLS certificate,
    # so the committer cert is intentionally reused here.
    clientCert: /testdata/crypto/peerOrganizations/Org1/peers/committer.org1.example.com/tls/server.crt
    clientKey: /testdata/crypto/peerOrganizations/Org1/peers/committer.org1.example.com/tls/server.key
    rootCerts:
      - /testdata/crypto/peerOrganizations/Org1/peers/committer.org1.example.com/tls/ca.crt

queries:
  address: committer:7001
  tls:
    enabled: true
    clientCert: /testdata/crypto/peerOrganizations/Org1/peers/committer.org1.example.com/tls/server.crt
    clientKey: /testdata/crypto/peerOrganizations/Org1/peers/committer.org1.example.com/tls/server.key
    rootCerts:
      - /testdata/crypto/peerOrganizations/Org1/peers/committer.org1.example.com/tls/ca.crt

notifications:
  address: committer:4001
  tls:
    enabled: true
    clientCert: /testdata/crypto/peerOrganizations/Org1/peers/committer.org1.example.com/tls/server.crt
    clientKey: /testdata/crypto/peerOrganizations/Org1/peers/committer.org1.example.com/tls/server.key
    rootCerts:
      - /testdata/crypto/peerOrganizations/Org1/peers/committer.org1.example.com/tls/ca.crt
  connectionTimeout: 10s
  waitingTimeout: 10s
